name: Публикация в Telegram

on:
  schedule:
    - cron: '34 9 * * *'  # 12:34 МСК (UTC+3)
  workflow_dispatch:       # ручной запуск из GitHub

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Зависимости
        run: pip install -r bot/requirements.txt

      - name: Публикация
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHANNEL_ID: ${{ secrets.CHANNEL_ID }}
        run: python bot/publish.py

      - name: Сохранить изменения статусов
        run: |
          git config user.name "Content Factory Bot"
          git config user.email "bot@content-factory"
          git add posts/ published/
          git diff --cached --quiet || git commit -m "Опубликован пост $(date +'%Y-%m-%d')"
          git push
