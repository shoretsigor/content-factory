name: Публикация в Telegram

on:
  schedule:
    - cron: '34 9 * * *'   # 12:34 МСК — слот 1
    - cron: '45 10 * * *'  # 13:45 МСК — слот 2
  workflow_dispatch:
    inputs:
      slot:
        description: 'Слот (1 или 2)'
        required: false
        default: '1'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Определить слот
        run: |
          if [ "${{ github.event.schedule }}" = "34 9 * * *" ]; then
            echo "SLOT=1" >> $GITHUB_ENV
          elif [ "${{ github.event.schedule }}" = "45 10 * * *" ]; then
            echo "SLOT=2" >> $GITHUB_ENV
          else
            echo "SLOT=${{ github.event.inputs.slot || '1' }}" >> $GITHUB_ENV
          fi

      - name: Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Зависимости
        run: pip install -r bot/requirements.txt

      - name: Публикация
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHANNEL_ID: ${{ secrets.CHANNEL_ID }}
        run: python bot/publish.py

      - name: Сохранить изменения статусов
        run: |
          git config user.name "Content Factory Bot"
          git config user.email "bot@content-factory"
          git add posts/ published/
          git diff --cached --quiet || git commit -m "Опубликован пост $(date +'%Y-%m-%d') слот ${SLOT}"
          git push
